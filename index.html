<!DOCTYPE html>
<html>
<head>
<title>For My Love ❤️</title>

<style>

body{
background:#ffe6f0;
font-family:Arial;
text-align:center;
overflow:hidden;
margin-top:80px;
}

h1{
color:#ff3366;
}

button{
padding:12px 20px;
font-size:16px;
background:#ff3366;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
margin:10px;
}

button:hover{
background:#e6005c;
}

#message{
font-size:20px;
margin-top:20px;
color:#333;
width:70%;
margin-left:auto;
margin-right:auto;
}

#countdown{
font-size:22px;
margin-top:20px;
color:#ff3366;
}

.heart{
position:fixed;
bottom:-20px;
font-size:20px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(0);}
100%{transform:translateY(-100vh);}
}

</style>

</head>

<body>

<h1 id="title"></h1>

<div id="letter"></div>

<div id="countdown"></div>

<button onclick="missMe()">I Miss You</button>

<div id="message"></div>

<script>

var herName = "Ama";

document.getElementById("title").innerHTML = "For " + herName + " ❤️";

var text = "My dear " + herName + ", even in silence you are always in my heart. This little page is just a reminder that you are loved, appreciated, and always on my mind.";

var i = 0;

function typeLetter(){
if(i < text.length){
document.getElementById("letter").innerHTML += text.charAt(i);
i++;
setTimeout(typeLetter,50);
}
}

typeLetter();

var messages = [

"I miss you " + herName + ".",

"You make my world brighter.",

"My heart always finds its way to you.",

"Even in silence, I still think about you " + herName + ".", 

"You are my favorite person.",

"I can’t wait to see you again."

];

function missMe(){

var random = Math.floor(Math.random()*messages.length);

document.getElementById("message").innerHTML = messages[random];

}

var target = new Date("April 1, 2026 00:00:00").getTime();

setInterval(function(){

var now = new Date().getTime();

var diff = target - now;

var days = Math.floor(diff/(1000*60*60*24));
var hours = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
var minutes = Math.floor((diff%(1000*60*60))/(1000*60));

document.getElementById("countdown").innerHTML =
days + " days " + hours + " hours " + minutes + " minutes until we talk again ❤️";

},1000);

function createHeart(){

var heart = document.createElement("div");

heart.classList.add("heart");

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

heart.style.animationDuration=(3+Math.random()*5)+"s";

document.body.appendChild(heart);

setTimeout(function(){

heart.remove();

},6000);

}

setInterval(createHeart,500);

</script>

</body>

</html>
