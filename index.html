<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Naa Shika ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Poppins:wght@300;400;600&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
            background: linear-gradient(135deg, #0c0c1a 0%, #1a0033 50%, #2d1b69 100%);
            min-height: 100vh;
            position: relative;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Night Sky & Background */
        #stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .star { position: absolute; background: white; border-radius: 50%; animation: twinkle 2s infinite alternate; }
        @keyframes twinkle { 0% { opacity: 0.3; transform: scale(1); } 100% { opacity: 1; transform: scale(1.2); } }
        
        .shooting-star { position: absolute; width: 2px; height: 2px; background: white; box-shadow: 0 0 10px #fff; animation: shoot 3s linear forwards; }
        @keyframes shoot { 0% { transform: translateX(0) translateY(0) rotate(45deg); opacity: 1; } 100% { transform: translateX(400px) translateY(400px) rotate(45deg); opacity: 0; } }

        .heart { position: absolute; color: #ff6b9d; pointer-events: none; z-index: 2; animation: float 6s infinite linear; }
        @keyframes float { 0% { transform: translateY(100vh) rotate(0deg); opacity: 1; } 100% { transform: translateY(-100px) rotate(360deg); opacity: 0; } }

        /* UI Containers */
        .container { position: relative; z-index: 10; max-width: 600px; width: 90%; padding: 20px; text-align: center; }

        .title {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(2rem, 8vw, 4rem);
            background: linear-gradient(45deg, #ff6b9d, #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1.5rem;
        }

        .letter-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            margin-bottom: 2rem;
        }

        #loveLetter { font-size: 1.1rem; line-height: 1.8; min-height: 100px; }

        .reason-display {
            background: white;
            color: #2d1b69;
            padding: 1.5rem;
            border-radius: 15px;
            margin: 1.5rem 0;
            font-style: italic;
            font-weight: 500;
            opacity: 0;
            transform: scale(0.9);
            transition: all 0.5s ease;
            display: none;
        }
        .reason-display.show { opacity: 1; transform: scale(1); display: block; }

        /* Buttons */
        .btn {
            background: linear-gradient(45deg, #ff6b9d, #c44569);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            margin: 10px;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 10px 20px rgba(255, 107, 157, 0.3);
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 15px 25px rgba(255, 107, 157, 0.5); }

        .music-toggle { position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; border-radius: 50%; background: rgba(255,255,255,0.2); backdrop-filter: blur(10px); border: none; color: white; cursor: pointer; z-index: 100; font-size: 1.5rem; }

        .countdown { font-weight: bold; color: #ff6b9d; margin-top: 20px; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div id="stars"></div>
    <div id="hearts"></div>

    <div class="container">
        <h1 class="title">For Naa Shika ❤️</h1>
        
        <div class="letter-box">
            <div id="loveLetter">Click the music button to begin our story...</div>
            <div class="reason-display" id="reasonDisplay"></div>
        </div>

        <div class="buttons">
            <button class="btn" onclick="showNewReason()">💖 Why I Love You</button>
            <button class="btn" onclick="openSecretLetter()">💌 Open Secret Letter</button>
        </div>

        <div class="countdown" id="countdown">⏳ Loading our next moment...</div>
    </div>

    <button class="music-toggle" id="musicToggle" onclick="toggleMusic()">🎵</button>

    <script>

        const loveReasons = [
            "Your smile lights up my world.", "Your laughter is my favorite sound.",

            "You make life feel magical.", "You are endlessly supportive.",

            "You accept me as I am.", "Your confidence inspires me.",
            "You're thoughtful in ways I can't describe.", "You make every day better just by being in it.",
            "Your honesty builds trust.", "You have the sweetest soul.",
            "You make the simplest things special.", "Your love feels like home.",
            "You're my favorite hello and hardest goodbye.", "Your eyes sparkle when you smile.",
            "You bring peace to my chaos.", "You make me feel lucky to be alive.",
            "Your touch calms me.", "You're my partner in everything.",
            "You make me laugh like no one else.", "You're endlessly patient with me.",
            "Your thoughts and ideas fascinate me.", "You always know what to say.",
            "You make ordinary days feel like adventures.", "Your support gives me strength.",
            "You inspire me to be my best self.", "Your curiosity is contagious.",
            "You make me feel understood.", "You have the kindest heart.",
            "You make my dreams feel possible.", "You are my safe place.",
            "Your determination amazes me.", "You light up every room you enter.",
            "You have the most beautiful laugh.", "You make love feel effortless.",
            "You bring joy wherever you go.", "You have a beautiful mind.",
            "Your honesty is refreshing.", "You make every moment worth remembering.",
            "You inspire me to dream bigger.", "You're my favorite person to be around.",
            "You have a magical way of making me happy.", "You make challenges feel easier.",
            "You're my constant thought.", "Your love is unconditional.",
            "You make me feel safe being myself.", "You are my sunshine on cloudy days.",
            "Your spirit is uplifting.", "You make me feel appreciated.",
            "Your love is my anchor.", "You are endlessly fascinating.",
            "You bring warmth to my life.", "Your smile is my favorite view.",
            "You make every place feel like home.", "You give me hope.",
            "You're my best friend.", "You make ordinary conversations special.",
            "You are thoughtful beyond measure.", "Your love motivates me.",
            "You make life brighter with your presence.", "Your hugs make everything better.",
            "You bring laughter to my soul.", "You're my favorite person to dream with.",
            "You have a heart full of love.", "You make me feel alive.",
            "You are patient and understanding.", "Your love is my guiding light.",
            "You make me want to be a better human.", "You have a beautiful soul that shines.",
            "You make my heart skip beats.", "Your support is unwavering.",
            "You inspire me with your strength.", "You make love feel magical.",
            "You are my favorite thought.", "You make the world a better place.",
            "You are endlessly loving.", "You make every second worth it.",
            "You are my heart's home.", "Your presence is comforting.",
            "You make me feel infinite love.", "You are my everything, Naa Shika.",
            "Your gentle nature melts my heart.", "You make me excited for every tomorrow.",
            "Your wisdom guides me.", "You make me feel truly cherished.",
            "Your passion ignites my soul.", "You create beauty wherever you go.",
            "Your resilience inspires me daily.", "You make my heart feel full.",
            "Your love is my greatest treasure.", "You understand my silence.",
            "Your dreams become my dreams.", "You make every journey worthwhile.",
            "Your light never fades.", "You are my forever favorite.",
            "Your love story is my favorite.", "You make eternity feel possible.",
            "Your heart beats in sync with mine.", "You are my rare and beautiful find.",
            "Your love makes me limitless."
        ];

        // --- Core Logic ---
        function typeWriter(text, elementId, speed = 50) {
            let i = 0;
            const el = document.getElementById(elementId);
            el.innerHTML = "";
            function type() {
                if (i < text.length) {
                    el.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(type, speed);
                }
            }
            type();
        }

        function createStars() {
            const container = document.getElementById('stars');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.width = star.style.height = Math.random() * 3 + 'px';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 2 + 's';
                container.appendChild(star);
            }
        }

        function showNewReason() {
            const display = document.getElementById('reasonDisplay');
            const reason = loveReasons[Math.floor(Math.random() * loveReasons.length)];
            display.classList.remove('show');
            setTimeout(() => {
                display.innerText = `"${reason}"`;
                display.classList.add('show');
                createShootingStar();
            }, 200);
        }

        function createShootingStar() {
            const star = document.createElement('div');
            star.className = 'shooting-star';
            star.style.left = Math.random() * 50 + '%';
            star.style.top = Math.random() * 50 + '%';
            document.body.appendChild(star);
            setTimeout(() => star.remove(), 3000);
        }

        function openSecretLetter() {
            const text = `Naa Shika, even when we aren't talking, you are the gravity that holds my world together. This page is a reminder that my love for you is as vast as the sky above.`;
            typeWriter(text, 'loveLetter', 40);
        }

        function updateCountdown() {
            const nextTalk = new Date("March 20, 2026 18:00:00").getTime();
            const now = new Date().getTime();
            const diff = nextTalk - now;
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            document.getElementById('countdown').innerText = `⏳ ${d}d ${h}h ${m}m until we talk again ❤️`;
        }

        // Music System
        let audioCtx;
        function toggleMusic() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                setInterval(playSoftNote, 2000);
                document.getElementById('musicToggle').innerText = "🔇";
                typeWriter(`My dear ${herName}, welcome to our little universe...`, 'loveLetter');
            } else {
                audioCtx.close();
                audioCtx = null;
                document.getElementById('musicToggle').innerText = "🎵";
            }
        }

        function playSoftNote() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(261.63 + (Math.random() * 100), audioCtx.currentTime);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 2);
            osc.start();
            osc.stop(audioCtx.currentTime + 2);
        }

        window.onload = () => {
            createStars();
            updateCountdown();
            setInterval(updateCountdown, 60000);
        };
    </script>
</body>
</html>
