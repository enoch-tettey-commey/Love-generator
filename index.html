<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Naa Shika ❤️</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Poppins:wght@300;400;600&display=swap');
    
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        font-family: 'Poppins', sans-serif;
        background: linear-gradient(135deg, #ffe6f0 0%, #ffd9e6 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        overflow: hidden;
        text-align: center;
        padding: 20px;
    }

    h1 {
        font-family: 'Dancing Script', cursive;
        font-size: clamp(2rem, 5vw, 4rem);
        color: #ff3366;
        margin-bottom: 1rem;
    }

    p.message {
        font-size: 1.3rem;
        color: #333;
        background: rgba(255,255,255,0.6);
        padding: 20px;
        border-radius: 15px;
        max-width: 600px;
        min-height: 80px;
        margin: 20px auto;
        line-height: 1.6;
        opacity: 0;
        transform: translateY(20px);
        transition: opacity 0.6s ease, transform 0.6s ease;
    }

    p.message.show {
        opacity: 1;
        transform: translateY(0);
    }

    button {
        font-family: 'Poppins', sans-serif;
        font-weight: 600;
        font-size: 1.1rem;
        padding: 15px 30px;
        background: linear-gradient(45deg, #ff6699, #ff3366);
        color: white;
        border: none;
        border-radius: 50px;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 10px 20px rgba(255, 51, 102, 0.4);
        margin-top: 15px;
    }

    button:hover {
        transform: translateY(-3px);
        box-shadow: 0 15px 30px rgba(255, 51, 102, 0.6);
    }

</style>
</head>
<body>

<h1>For Naa Shika ❤️</h1>
<p class="message" id="messageBox"></p>
<button id="surpriseBtn">💖 Show Me Why You Love Me</button>

<script>
    // Full array of 1000 romantic messages (only a few shown for brevity, add all your 1000)
    const surpriseMessages = [
        "Your smile changes my whole mood.",
        "You make ordinary days feel special.",
        "You listen to me in a way that feels safe.",
        "Your voice is one of my favorite sounds.",
        "You inspire me to be better every day.",
        "The way you laugh makes my heart happy.",
        "You understand me without me saying much.",
        "Your hugs feel like home.",
        "You make me excited about tomorrow.",
        "Your kindness shines through everything you do.",
        "You make me feel seen and valued.",
        "The way your eyes light up when you're happy.",
        "You make challenges feel manageable together.",
        "Your passion for life is contagious.",
        "You remember the little things that matter to me.",
        "Your strength encourages me to be strong too.",
        "You make silence comfortable.",
        "Your creativity never ceases to amaze me.",
        "You celebrate my wins like they're your own.",
        "Your gentle touch calms my soul.",
        "You make me want to be the best version of myself."
        // ... add remaining messages until all 1000
    ];

    const messageBox = document.getElementById('messageBox');
    const btn = document.getElementById('surpriseBtn');

    function typeWriterEffect(element, text, speed = 50) {
        element.innerHTML = '';
        let i = 0;
        element.classList.add('show');

        function type() {
            if(i < text.length){
                element.innerHTML += text.charAt(i);
                i++;
                setTimeout(type, speed);
            }
        }
        type();
    }

    btn.addEventListener('click', () => {
        // Pick a random message
        const randomIndex = Math.floor(Math.random() * surpriseMessages.length);
        const message = surpriseMessages[randomIndex];

        // Reset animation
        messageBox.classList.remove('show');
        setTimeout(() => {
            typeWriterEffect(messageBox, message, 40);
        }, 200);
    });

</script>

</body>
</html>
